name: Draft Kit UI CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main, master]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Set environment variables
        run: cp .env.example .env.local

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Check types
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
        env:
          MONGODB_URI: mongodb://localhost:27017/draftkit-test
          MONGODB_DB_NAME: draftkit-test
          NODE_ENV: test

      - name: Build application
        run: npm run build
